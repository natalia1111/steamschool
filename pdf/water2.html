<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Просмотр PDF</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    .pdf-viewer {
      width: 100%;
      height: 100vh; /* занимает всю высоту окна */
      border: none;
    }
  </style>
</head>
<body>
  <!-- Вариант с iframe -->
  <iframe class="pdf-viewer" src="w2.pdf"></iframe>

  <!-- Вариант с embed -->
  <!-- <embed src="example.pdf" type="application/pdf" class="pdf-viewer"> -->
</body>
</html>
